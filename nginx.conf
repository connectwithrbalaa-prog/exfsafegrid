server {
    listen 80;
    server_name _;

    # Docker's embedded DNS — resolve upstream names per-request,
    # not at nginx startup (prevents crash when api isn't up yet)
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint (used by Docker HEALTHCHECK)
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Python FastAPI backend — proxy /api/* → api:8000
    location ^~ /api/ {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://api:8000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # React Router — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for hashed static assets (JS, CSS, fonts)
    location ~* \.(js|css|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # Short cache for images and icons
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
}
