version: "3.9"
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: exf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: exf_wildfire
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exf_wildfire"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build: .
    container_name: exf_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/exf_wildfire
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      API_KEY: ${API_KEY:-}
      LOG_LEVEL: INFO
      MODEL_DIR: /app/models/artifacts
    ports:
      - "8000:8000"
    volumes:
      - model_artifacts:/app/models/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  pgdata:
  model_artifacts:
