name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH to VPS & deploy full stack
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          envs: >
            VITE_SUPABASE_URL,
            VITE_SUPABASE_PUBLISHABLE_KEY,
            VITE_SUPABASE_PROJECT_ID,
            POSTGRES_PASSWORD,
            ANTHROPIC_API_KEY,
            API_KEY
          script: |
            set -e
            cd /docker/exfsafegrid
            git pull origin main

            # Write .env from GitHub secrets (overwrite on every deploy)
            # printf avoids heredoc shell-expansion issues with values containing $ or !
            printf '%s\n' \
              "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" \
              "VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY" \
              "VITE_SUPABASE_PROJECT_ID=$VITE_SUPABASE_PROJECT_ID" \
              "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" \
              "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" \
              "API_KEY=$API_KEY" \
              > .env

            # Build and start all services: db, api (Python + ML models), frontend (Nginx)
            docker compose up -d --build --remove-orphans

            # Remove dangling images to free disk space
            docker image prune -f
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
